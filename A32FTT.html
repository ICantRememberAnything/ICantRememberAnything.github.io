/* =========================
   LOGIC (DON'T TOUCH)
   ========================= */

let questions = [];

/* Shuffle array */
function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

/* Shuffle answers */
function shuffleOptions(q) {
  const paired = q.options.map((opt, i) => ({
    text: opt,
    correct: i === q.answer
  }));
  shuffleArray(paired);
  q.options = paired.map(p => p.text);
  q.answer = paired.findIndex(p => p.correct);
}

/* Render quiz */
function renderQuiz() {
  const quizDiv = document.getElementById("quiz");
  quizDiv.innerHTML = "";
  document.getElementById("score").innerText = "";

  questions.forEach((q, i) => {
    let html = `<div class="question"><p>${i+1}. ${q.q}</p>`;
    q.options.forEach((opt, j) => {
      html += `
        <label class="option" data-q="${i}" data-o="${j}">
          <input type="radio" name="q${i}" value="${j}" onchange="handleInstant(${i})">
          <span>${opt}</span>
        </label><br>
      `;
    });
    html += `</div>`;
    quizDiv.innerHTML += html;
  });
}

/* Submit */
function submitQuiz() {
  let score = 0;

  questions.forEach((q, i) => {
    const selected = document.querySelector(`input[name="q${i}"]:checked`);
    const labels = document.querySelectorAll(`label[data-q="${i}"]`);

    labels.forEach((label, j) => {
      if (j === q.answer) label.classList.add("correct");
      if (selected && j === +selected.value && j !== q.answer)
        label.classList.add("wrong");
    });

    if (selected && +selected.value === q.answer) score++;

    document
      .querySelectorAll(`input[name="q${i}"]`)
      .forEach(r => r.disabled = true);
  });

  document.getElementById("score").innerText =
    `Score: ${score} / ${questions.length}`;
}

/* Instant Feedback */
function handleInstant(qIndex) {
  if (!document.getElementById("instantToggle").checked) return;

  const q = questions[qIndex];
  const selected = document.querySelector(`input[name="q${qIndex}"]:checked`);
  const labels = document.querySelectorAll(`label[data-q="${qIndex}"]`);

  labels.forEach((label, j) => {
    if (j === q.answer) label.classList.add("correct");
    if (selected && j === +selected.value && j !== q.answer)
      label.classList.add("wrong");
  });

  // Lock this question
  document
    .querySelectorAll(`input[name="q${qIndex}"]`)
    .forEach(r => r.disabled = true);
}


/* Reset */
function resetQuiz() {
  const shuffleEnabled = document.getElementById("shuffleToggle").checked;
  const selectedChapter = document.getElementById("chapterSelect").value;

  let count = parseInt(document.getElementById("questionCount").value);
  let start = parseInt(document.getElementById("rangeStart").value);
  let end = parseInt(document.getElementById("rangeEnd").value);

  // Get chapter pool
  let pool = originalQuestions.filter(q => q.chapter === selectedChapter);

  if (pool.length === 0) {
    alert("No questions in this chapter.");
    return;
  }

  // Clamp range
  if (isNaN(start) || start < 1) start = 1;
  if (isNaN(end) || end > pool.length) end = pool.length;

  if (start > end) [start, end] = [end, start];

  // Apply range (convert to 0-based index)
  pool = pool.slice(start - 1, end);

  // Fix count
  if (isNaN(count) || count < 1) count = pool.length;
  if (count > pool.length) count = pool.length;

  // Deep copy
  pool = JSON.parse(JSON.stringify(pool));

  // Shuffle questions if enabled
  if (shuffleEnabled) shuffleArray(pool);

  // Pick N
  questions = pool.slice(0, count);

  // Shuffle answers if enabled
  if (shuffleEnabled) {
    questions.forEach(shuffleOptions);
  }

  renderQuiz();
}


/* Question Subsets Selection */
function populateChapterSelect() {
  const select = document.getElementById("chapterSelect");
  select.innerHTML = "";

  const chapters = [...new Set(originalQuestions.map(q => q.chapter))];

  chapters.forEach(ch => {
    const opt = document.createElement("option");
    opt.value = ch;
    opt.textContent = ch;
    select.appendChild(opt);
  });

  updateChapterSize(); //
}

function selectAllInChapter() {
  const selectedChapter = document.getElementById("chapterSelect").value;

  let start = parseInt(document.getElementById("rangeStart").value);
  let end = parseInt(document.getElementById("rangeEnd").value);

  let pool = originalQuestions.filter(q => q.chapter === selectedChapter);

  if (isNaN(start) || start < 1) start = 1;
  if (isNaN(end) || end > pool.length) end = pool.length;

  if (start > end) [start, end] = [end, start];

  const rangeSize = end - start + 1;

  document.getElementById("questionCount").value = rangeSize;

  resetQuiz();
}

function updateChapterSize() {
  const selectedChapter = document.getElementById("chapterSelect").value;

  const size = originalQuestions.filter(
    q => q.chapter === selectedChapter
  ).length;

  document.getElementById("chapterSize").textContent =
    `(${size} questions)`;

  // Reset range to full chapter
  document.getElementById("rangeStart").value = 1;
  document.getElementById("rangeEnd").value = size;
}


/* Jump to Top */
function scrollToTop() {
  window.scrollTo({ top: 0, behavior: "smooth" });
}
